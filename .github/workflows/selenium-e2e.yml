name: Selenium E2E Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Verify Chrome Installation
      run: google-chrome --version
        
    - name: Install Application Dependencies
      working-directory: ./Backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Ensure testing packages are installed
        pip install pytest selenium webdriver-manager pandas openpyxl

    - name: Execute Automated Selenium Test Suite
      working-directory: ./Backend
      run: |
        python run_e2e.py

    - name: Upload E2E Excel Report Artifact
      uses: actions/upload-artifact@v4
      if: always() # Upload the report even if some tests fail
      with:
        name: SecureExam-E2E-Report
        path: Backend/E2E_Test_Report.xlsx
