name: Selenium E2E Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Backend/package-lock.json
        
    - name: Verify Chrome Installation
      run: google-chrome --version
        
    - name: Install Application Dependencies
      run: |
        npm install
        cd Backend && npm install
        
    - name: Start Application Servers in Background
      run: |
        cd Backend && npm run dev &
        npm run dev &
        npx wait-on http://localhost:8082 http://localhost:5001/health -t 60000
        
    - name: Execute Automated Selenium Test Suite
      working-directory: ./Backend
      run: |
        npm run e2e:real

    - name: Publish E2E Test Summary
      if: always()
      working-directory: ./Backend
      run: |
        if [ -f E2E_Test_Report_Summary.md ]; then
          cat E2E_Test_Report_Summary.md >> $GITHUB_STEP_SUMMARY
        else
          echo "### ⚠️ E2E QA Test Summary report not found!" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload E2E Excel Report Artifact
      uses: actions/upload-artifact@v4
      if: always() # Upload the report even if some tests fail
      with:
        name: DevAI-E2E-Report
        path: Backend/E2E_Test_Report.xlsx
